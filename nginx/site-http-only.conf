# Bootstrap config used during the very first deploy — before Let's Encrypt
# certificates exist. After certbot succeeds, we swap to site.conf which adds TLS.
server {
  listen 80;
  server_name demo.dupa.online tgads.dupa.online analytics.dupa.online;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /tg/hook {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
  }

  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
  }

  location /ws {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 600s;
  }

  location /cdn/ {
    proxy_pass http://minio:9000/;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
  }
}
