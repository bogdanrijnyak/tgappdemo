server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store" always;
  }

  location ~* \.(?:js|jsx|css|png|jpg|jpeg|svg|webp|ico|woff2?)$ {
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
  }
}
