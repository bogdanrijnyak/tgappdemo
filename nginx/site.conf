upstream tgappdemo_api {
  server api:8000;
}

upstream tgappdemo_frontend {
  server frontend:80;
}

server {
  listen 80;
  server_name demo.dupa.online;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name demo.dupa.online;

  ssl_certificate     /etc/letsencrypt/live/demo.dupa.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/demo.dupa.online/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;

  client_max_body_size 16m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location = /tg/hook {
    proxy_pass http://tgappdemo_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /api/ {
    proxy_pass http://tgappdemo_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }

  location = /health {
    proxy_pass http://tgappdemo_api;
  }

  location /ws {
    proxy_pass http://tgappdemo_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  location /cdn/ {
    proxy_pass http://minio:9000/;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://tgappdemo_frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# ─── tgads-dash (subdomain: tgads.dupa.online) ────────────────────────────
# Phase 1: HTTP-only — exposes ACME webroot so certbot can issue a cert.
# TLS server block lands in a follow-up commit once the cert exists.
server {
  listen 80;
  server_name tgads.dupa.online;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 404;
  }
}
