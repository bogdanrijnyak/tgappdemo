<meta charset="utf-8">

<title>API Showcase · Telegram Mini App prototype</title>
<style>
  :root {
    /* Token defaults — overwritten by applyTheme() at runtime */
    --tg-bg:#ffffff; --tg-text:#000000; --tg-hint:#9aa0a8;
    --tg-link:#2481cc; --tg-button:#2481cc; --tg-button-text:#ffffff;
    --tg-secondary-bg:#eff1f5; --tg-header-bg:#f7f8fa; --tg-bottom-bar-bg:#ffffff;
    --tg-accent:#2481cc; --tg-section-bg:#ffffff;
    --tg-section-header-text:#6d6d72; --tg-section-separator:#e6e6eb;
    --tg-subtitle-text:#8e8e93; --tg-destructive-text:#ff3b30;
    --tg-card-shadow:0 1px 0 rgba(15,17,20,0.04), 0 4px 18px rgba(15,17,20,0.06);
    --tg-card-border:rgba(15,17,20,0.06);
    --tg-glass-bg:rgba(255,255,255,0.72);
    --tg-stage-1:#1a1d22; --tg-stage-2:#0a0b0e;
  }

  html, body, #root {
    margin: 0; padding: 0;
    height: 100%; min-height: 100%;
    background: #07080a;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
                  "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  *, *::before, *::after { box-sizing: border-box; }

  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* ─── Motion ──────────────────────────────────────────────────────── */
  @keyframes tg-ripple {
    0%   { width: 12px;  height: 12px;  opacity: 0.8; }
    100% { width: 140px; height: 140px; opacity: 0; }
  }
  @keyframes tg-label {
    0%   { opacity: 0; transform: translate(-50%, -90%) scale(0.85); }
    20%  { opacity: 1; transform: translate(-50%, -120%) scale(1); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -130%) scale(0.95); }
  }
  @keyframes tg-pulse {
    0%, 100% { transform: scale(1);     box-shadow: 0 18px 40px color-mix(in oklch, var(--tg-accent) 40%, transparent), inset 0 1px 0 rgba(255,255,255,0.4); }
    50%      { transform: scale(1.025); box-shadow: 0 22px 48px color-mix(in oklch, var(--tg-accent) 50%, transparent), inset 0 1px 0 rgba(255,255,255,0.45); }
  }
  @keyframes tg-shine {
    0%   { left: -40%; }
    60%  { left: 140%; }
    100% { left: 140%; }
  }
  @keyframes tg-spin {
    100% { transform: rotate(360deg); }
  }
  @keyframes tg-fade-in {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes tg-sheet-up {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes tg-pop {
    0%   { transform: scale(0.92); opacity: 0; }
    60%  { transform: scale(1.04); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes tg-scanline {
    0%   { top: 30px; }
    50%  { top: calc(100% - 30px); }
    100% { top: 30px; }
  }
  @keyframes tg-confetti {
    0%   { transform: translate(-50%, -50%) rotate(0); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--vx)), calc(-50% + var(--vy) + 220px)) rotate(var(--rot)); opacity: 0; }
  }
  @keyframes tg-cloud-pulse {
    0%   { transform: scale(1);    }
    50%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  @keyframes tg-premium-pulse {
    0%, 100% { transform: scale(1);    box-shadow: 0 18px 42px rgba(95,39,205,0.5), inset 0 1px 0 rgba(255,255,255,0.35); }
    50%      { transform: scale(1.04); box-shadow: 0 22px 50px rgba(95,39,205,0.6), inset 0 1px 0 rgba(255,255,255,0.45); }
  }
  @keyframes tg-wave {
    0%   { transform: scaleY(0.3); }
    100% { transform: scaleY(1.0); }
  }
  @keyframes tg-blob {
    0%, 100% { transform: translate(0, 0)   scale(1); }
    33%      { transform: translate(8px, -6px) scale(1.05); }
    66%      { transform: translate(-6px, 4px) scale(0.96); }
  }
  @keyframes tg-echo-fly {
    0%   { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(40px); opacity: 0; }
  }

  /* Adaptive Gallery grid — addendum §1 calls for 1/2/3 cols by viewport
     breakpoint. Container queries on the gallery scroll surface let the
     grid respond to its actual rendered width (the iOS frame mock is fixed
     at 402 px, so it naturally falls into the 2-col band).
     Breakpoints stay close to the addendum's spirit but bias toward the
     iOS frame's width so the approved 2-col design stays the default. */
  .tg-gallery-scroller { container-type: inline-size; }
  .tg-card-grid {
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr;
  }
  @container (min-width: 320px) {
    .tg-card-grid { grid-template-columns: 1fr 1fr; }
  }
  @container (min-width: 700px) {
    .tg-card-grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  /* View transitions */
  @keyframes tg-view-in-r {
    from { opacity: 0; transform: translateX(28px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes tg-view-in-l {
    from { opacity: 0; transform: translateX(-28px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes tg-view-out-l {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(-28px); }
  }
  @keyframes tg-view-out-r {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(28px); }
  }
</style>
</head>
