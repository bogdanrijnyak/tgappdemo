name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    name: Lint + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax + import smoke
        working-directory: backend
        env:
          ENV: dev
          BOT_TOKEN: "0:ci-fake"
          DATABASE_URL: sqlite+aiosqlite:///./tmp.db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: |
          python -m compileall -q app
          python -c "import app.main, app.bot.handlers, app.tasks.story_png, app.tasks.refund"

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH into VPS and pull
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /opt/tgappdemo
            git fetch origin
            git reset --hard origin/main
            docker compose pull || true
            docker compose up -d --build
            docker image prune -f >/dev/null 2>&1 || true
            sleep 3
            curl -fsS http://localhost/health || true
